name: "Cooper"
version: "1.0.0"
slug: "cooper"
description: "Hunde-Tracker für Cooper: Gassi, Fütterung, Gewicht, Gesundheit & Training"
url: "https://github.com/fahrstuhl1/cooper-app"
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:dog
panel_title: Cooper
map:
  - addon_config:rw
  - data:rw
options:
  dog_name: "Cooper"
  birthdate: "2025-09-13"
  persons:
    - "Max"
    - "Franzi"
  daily_food_target_g: 300
  health_reminder_days: 30
  log_level: info
schema:
  dog_name: str
  birthdate: str
  persons:
    - str
  daily_food_target_g: int(50,2000)
  health_reminder_days: int(1,180)
  log_level: list(debug|info|warning|error)
