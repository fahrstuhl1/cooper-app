name: "Cooper"
version: "2.0.0"
slug: "cooper"
description: "Tier-Gesundheitstracker: Gewicht, Impfungen, Wurmkur, Tierarzt & mehr für alle Haustiere"
url: "https://github.com/fahrstuhl1/cooper-app"
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:paw
panel_title: Cooper
map:
  - addon_config:rw
  - data:rw
options:
  animals:
    - name: "Cooper"
      species: "dog"
      birthdate: "2025-09-13"
    - name: "Katze 1"
      species: "cat"
      birthdate: ""
    - name: "Katze 2"
      species: "cat"
      birthdate: ""
  persons:
    - "Max"
    - "Franzi"
  daily_food_target_g: 300
  health_reminder_days: 30
  log_level: info
schema:
  animals:
    - name: str
      species: list(dog|cat|rabbit|bird|reptile|other)
      birthdate: str
  persons:
    - str
  daily_food_target_g: int(50,2000)
  health_reminder_days: int(1,180)
  log_level: list(debug|info|warning|error)
