name: "Cooper"
version: "2.6.0"
slug: "cooper"
description: "Tier-Gesundheitstracker: Gewicht, Impfungen, Wurmkur, Tierarzt & mehr für alle Haustiere"
url: "https://github.com/fahrstuhl1/cooper-app"
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:paw
panel_title: Cooper
map:
  - addon_config:rw
  - data:rw
options:
  animals:
    - name: "Cooper"
      species: "dog"
      birthdate: "2025-09-13"
    - name: "Katze 1"
      species: "cat"
      birthdate: ""
    - name: "Katze 2"
      species: "cat"
      birthdate: ""
  health_reminder_days: 30
  notification_service: notify
  notify_hour: 8
  log_level: info
  timezone: "Europe/Berlin"
schema:
  animals:
    - name: str
      species: list(dog|cat|rabbit|bird|reptile|other)
      birthdate: str
  health_reminder_days: int(1,180)
  notification_service: str
  notify_hour: int(0,23)
  log_level: list(debug|info|warning|error)
  timezone: str
