<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Cooper</title>
<style>
:root {
  --bg: #F0F4FF;
  --surface: #FFFFFF;
  --primary: #4F46E5;
  --primary-bg: #EEF2FF;
  --primary-dark: #4338CA;
  --text: #111827;
  --muted: #6B7280;
  --border: #E5E7EB;
  --danger: #EF4444;
  --success: #10B981;
  --warning: #F59E0B;
  --shadow: 0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,.1);
  --radius: 14px;
  --gap: 12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column}

/* ── Header ── */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-main{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;gap:10px}
.brand{font-size:1.05rem;font-weight:800;color:var(--primary);letter-spacing:-.02em;flex-shrink:0}
.person-chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex-shrink:1;min-width:0}
.person-chips::-webkit-scrollbar{display:none}
.animal-bar{display:flex;gap:7px;overflow-x:auto;padding:7px 16px 9px;scrollbar-width:none;border-bottom:1px solid var(--border)}
.animal-bar::-webkit-scrollbar{display:none}

/* ── Chips ── */
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:999px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;user-select:none;font-family:inherit}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.chip:not(.active):hover{border-color:var(--primary);color:var(--primary)}
.animal-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:999px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;user-select:none;font-family:inherit}
.animal-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.animal-chip:not(.active):hover{border-color:var(--primary);color:var(--primary)}

/* ── Tabs ── */
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:87px;z-index:90}
.tab-btn{flex:1;padding:10px 2px;border:none;background:none;color:var(--muted);font-size:.72rem;font-weight:600;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;font-family:inherit;letter-spacing:.01em}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}

/* ── Layout ── */
.main-content{flex:1;padding:var(--gap);max-width:640px;margin:0 auto;width:100%;padding-bottom:80px}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ── Cards ── */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:var(--gap)}
.card-title{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}

/* ── Animal hero ── */
.animal-hero{display:flex;align-items:center;gap:14px}
.animal-avatar{width:58px;height:58px;border-radius:50%;background:var(--primary-bg);display:flex;align-items:center;justify-content:center;font-size:1.9rem;flex-shrink:0}
.animal-info h2{font-size:1.15rem;font-weight:800}
.species-label{font-size:.78rem;color:var(--muted);text-transform:capitalize;margin-top:1px}
.age-label{font-size:.82rem;color:var(--primary);font-weight:600;margin-top:3px}
.animal-stats{display:flex;gap:0;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.stat{flex:1;text-align:center;padding:0 6px}
.stat+.stat{border-left:1px solid var(--border)}
.stat .val{font-size:1.15rem;font-weight:800;color:var(--text)}
.stat .lbl{font-size:.68rem;color:var(--muted);margin-top:3px;font-weight:500}

/* ── Progress ── */
.progress-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px}
.p-val{font-size:1.05rem;font-weight:800}
.p-target{font-size:.78rem;color:var(--muted)}
.progress-bar{height:9px;background:var(--border);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:999px;transition:width .4s ease;min-width:3px}
.progress-fill.done{background:var(--success)}
.progress-fill.over{background:var(--warning)}
.progress-note{font-size:.73rem;color:var(--muted);margin-top:6px}

/* ── Health events ── */
.event-list{display:flex;flex-direction:column;gap:8px}
.event-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;background:var(--bg);border-left:3px solid var(--border)}
.event-item.overdue{border-left-color:var(--danger);background:#FFF5F5}
.event-item.upcoming{border-left-color:var(--warning);background:#FFFBEB}
.event-item.ok{border-left-color:var(--success);background:#F0FDF4}
.event-badge{font-size:.66rem;font-weight:700;padding:2px 7px;border-radius:999px;white-space:nowrap;display:inline-block;margin-bottom:5px}
.badge-Impfung{background:#DBEAFE;color:#1D4ED8}
.badge-Wurmkur{background:#FEF3C7;color:#92400E}
.badge-Parasitenschutz{background:#FCE7F3;color:#9D174D}
.badge-Tierarzt-Termin{background:#E0E7FF;color:#3730A3}
.badge-Sonstiges{background:var(--border);color:var(--muted)}
.event-body{flex:1;min-width:0}
.event-title{font-size:.88rem;font-weight:700}
.event-date{font-size:.73rem;color:var(--muted);margin-top:2px}
.event-due{font-size:.75rem;font-weight:700;margin-top:4px}
.event-due.overdue{color:var(--danger)}
.event-due.upcoming{color:var(--warning)}
.event-actions{display:flex;gap:3px;flex-shrink:0}

/* ── Icon buttons ── */
.icon-btn{width:30px;height:30px;border:none;background:none;cursor:pointer;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.82rem;transition:background .12s;flex-shrink:0}
.icon-btn:hover{background:var(--border);color:var(--text)}
.icon-btn.danger:hover{background:#FEE2E2;color:var(--danger)}

/* ── Filter row ── */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;margin-bottom:var(--gap);scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}

/* ── Feeding items ── */
.feeding-item{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.feeding-item:last-child{border-bottom:none}
.feeding-food{font-size:.88rem;font-weight:700}
.feeding-meta{font-size:.72rem;color:var(--muted);margin-top:2px}
.feeding-amount{font-size:.92rem;font-weight:800;color:var(--primary);margin:0 8px;white-space:nowrap}

/* ── Weight chart ── */
.weight-chart-wrap{width:100%;background:var(--bg);border-radius:10px;overflow:hidden;margin-bottom:14px}
.weight-chart-wrap svg{display:block;width:100%;height:88px}

/* ── Weight items ── */
.weight-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.weight-item:last-child{border-bottom:none}
.weight-val{font-size:.95rem;font-weight:800}
.weight-sub{font-size:.73rem;color:var(--muted);margin-top:2px}

/* ── Animal list ── */
.animal-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:var(--bg);margin-bottom:8px}
.animal-icon{width:46px;height:46px;border-radius:50%;background:var(--primary-bg);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.animal-name{font-size:.92rem;font-weight:800}
.animal-sub{font-size:.75rem;color:var(--muted);margin-top:2px;text-transform:capitalize}

/* ── Forms ── */
.form-group{margin-bottom:12px}
label{display:block;font-size:.76rem;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.02em}
input,select,textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:9px;font-size:.88rem;font-family:inherit;color:var(--text);background:var(--surface);transition:border-color .15s;outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
textarea{resize:vertical;min-height:58px}
.form-row{display:flex;gap:10px}
.form-row>.form-group{flex:1}

/* ── Suggestions ── */
.suggestions{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.suggestion{font-size:.73rem;padding:3px 9px;border-radius:999px;background:var(--primary-bg);color:var(--primary);cursor:pointer;border:none;font-family:inherit;transition:background .12s;font-weight:600}
.suggestion:hover{background:var(--primary);color:#fff}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:9px;border:none;font-size:.85rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;letter-spacing:.01em}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-ghost{background:none;border:1.5px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:7px 13px;font-size:.78rem}
.btn-full{width:100%}

/* ── Sub-tabs ── */
.sub-tabs{display:flex;background:var(--bg);border-radius:11px;padding:3px;margin-bottom:var(--gap)}
.sub-tab{flex:1;padding:8px;border:none;background:none;border-radius:9px;font-size:.8rem;font-weight:700;cursor:pointer;color:var(--muted);transition:all .15s;font-family:inherit}
.sub-tab.active{background:var(--surface);color:var(--primary);box-shadow:var(--shadow)}

/* ── FAB ── */
.fab{position:fixed;bottom:22px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 14px rgba(79,70,229,.4);display:none;align-items:center;justify-content:center;z-index:80;transition:transform .12s,box-shadow .12s;line-height:1}
.fab:hover{transform:scale(1.06);box-shadow:0 6px 18px rgba(79,70,229,.5)}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-backdrop.open{display:flex}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:92dvh;overflow-y:auto;padding:20px 16px 36px;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:1rem;font-weight:800}
.modal-close{width:32px;height:32px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:inherit}

/* ── Toast ── */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:9px 20px;border-radius:999px;font-size:.82rem;font-weight:600;z-index:500;opacity:0;transition:opacity .18s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-md)}
.toast.show{opacity:1}

/* ── Empty / hint ── */
.empty{text-align:center;padding:32px 16px;color:var(--muted)}
.empty-icon{font-size:2.2rem;margin-bottom:8px}
.empty-text{font-size:.88rem}
.no-animal{text-align:center;padding:48px 24px;color:var(--muted)}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<header class="app-header">
  <div class="header-main">
    <div class="brand">🐾 Cooper</div>
    <div id="person-chips" class="person-chips"></div>
  </div>
  <div id="animal-bar" class="animal-bar"></div>
</header>

<nav class="tab-bar">
  <button class="tab-btn active" data-tab="start">🏠 Start</button>
  <button class="tab-btn" data-tab="health">💊 Gesundheit</button>
  <button class="tab-btn" data-tab="feed">🍖 Futter</button>
  <button class="tab-btn" data-tab="animals">🐾 Tiere</button>
</nav>

<main class="main-content">
  <div id="tab-start" class="tab-pane active"><div id="start-inner"></div></div>
  <div id="tab-health" class="tab-pane">
    <div id="health-filter" class="filter-row"></div>
    <div id="health-list"></div>
  </div>
  <div id="tab-feed" class="tab-pane">
    <div class="sub-tabs">
      <button class="sub-tab active" data-sub="feedings">🍖 Fütterung</button>
      <button class="sub-tab" data-sub="weights">⚖️ Gewicht</button>
    </div>
    <div id="feed-feedings"><div id="feedings-inner"></div></div>
    <div id="feed-weights" style="display:none"><div id="weights-inner"></div></div>
  </div>
  <div id="tab-animals" class="tab-pane"><div id="animals-inner"></div></div>
</main>

<button id="fab" class="fab" onclick="openHealthModal(null)">+</button>

<div id="modal-backdrop" class="modal-backdrop">
  <div class="modal-sheet">
    <div class="modal-header">
      <div id="modal-title" class="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const S = {
  meta: null,
  animalId: null,
  person: null,
  tab: 'start',
  subTab: 'feedings',
  healthFilter: null,
  health: [],
  feedings: [],
  feedSuggestions: [],
  weights: [],
  dashboard: null,
};

function persist() {
  if (S.animalId != null) localStorage.setItem('coop_animal', S.animalId);
  if (S.person) localStorage.setItem('coop_person', S.person);
  localStorage.setItem('coop_tab', S.tab);
}

function restorePersistedState() {
  const aid = parseInt(localStorage.getItem('coop_animal'));
  if (!isNaN(aid)) S.animalId = aid;
  S.person = localStorage.getItem('coop_person') || null;
  S.tab = localStorage.getItem('coop_tab') || 'start';
}

// ─── API ─────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body != null) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  // Strip leading slash so paths are relative to the HA Ingress base URL
  const url = path.replace(/^\//, '');
  const res = await fetch(url, opts);
  if (res.status === 204) return null;
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Fehler ' + res.status);
  return data;
}

function aq(extra) {
  const p = new URLSearchParams();
  if (S.animalId) p.set('animal_id', S.animalId);
  if (extra) Object.entries(extra).forEach(([k, v]) => { if (v != null) p.set(k, v); });
  const s = p.toString();
  return s ? '?' + s : '';
}

function withAnimal(body) {
  const b = { ...body };
  if (S.animalId) b.animal_id = S.animalId;
  if (S.person) b.person = S.person;
  return b;
}

// ─── Toast ───────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? 'var(--danger)' : 'var(--text)';
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ─── Formatting ──────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  try {
    const [y, m, d] = iso.substring(0, 10).split('-');
    return d + '.' + m + '.' + y;
  } catch(e) { return iso; }
}

function fmtDateTime(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso.endsWith('Z') ? iso : iso + 'Z');
    return d.toLocaleString('de-DE', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Berlin' });
  } catch(e) { return iso; }
}

function todayISO() {
  return new Date().toLocaleDateString('sv');
}

// ─── Header ──────────────────────────────────────────────────────────────────
function renderPersonChips() {
  const el = document.getElementById('person-chips');
  if (!S.meta || !S.meta.persons.length) { el.innerHTML = ''; return; }
  el.innerHTML = S.meta.persons.map(p =>
    '<button class="chip' + (S.person === p ? ' active' : '') + '" onclick="selectPerson(\'' + esc(p) + '\')">' + esc(p) + '</button>'
  ).join('');
}

function selectPerson(p) {
  S.person = p;
  persist();
  renderPersonChips();
}

function renderAnimalBar() {
  const bar = document.getElementById('animal-bar');
  if (!S.meta || !S.meta.animals.length) { bar.innerHTML = ''; return; }
  bar.innerHTML = S.meta.animals.map(a =>
    '<button class="animal-chip' + (S.animalId === a.id ? ' active' : '') + '" onclick="selectAnimal(' + a.id + ')">' +
    '<span>' + a.icon + '</span>' + esc(a.name) + '</button>'
  ).join('');
}

function selectAnimal(id) {
  S.animalId = id;
  persist();
  renderAnimalBar();
  refreshTab();
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  S.tab = tab;
  persist();
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
  document.getElementById('fab').style.display = tab === 'health' ? 'flex' : 'none';
  refreshTab();
}

document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

document.querySelectorAll('.sub-tab').forEach(b => b.addEventListener('click', () => {
  S.subTab = b.dataset.sub;
  document.querySelectorAll('.sub-tab').forEach(x => x.classList.toggle('active', x === b));
  document.getElementById('feed-feedings').style.display = S.subTab === 'feedings' ? '' : 'none';
  document.getElementById('feed-weights').style.display = S.subTab === 'weights' ? '' : 'none';
}));

function noAnimalHint() {
  return '<div class="no-animal"><div style="font-size:2.5rem;margin-bottom:10px">&#x1F43E;</div><div style="font-size:.9rem;font-weight:500">Bitte zuerst ein Tier auswählen</div></div>';
}

async function refreshTab() {
  if (!S.animalId && S.tab !== 'animals') {
    document.getElementById('start-inner').innerHTML = noAnimalHint();
    document.getElementById('health-list').innerHTML = noAnimalHint();
    document.getElementById('health-filter').innerHTML = '';
    document.getElementById('feedings-inner').innerHTML = noAnimalHint();
    document.getElementById('weights-inner').innerHTML = noAnimalHint();
    return;
  }
  if (S.tab === 'start') await renderStartTab();
  else if (S.tab === 'health') await renderHealthTab();
  else if (S.tab === 'feed') await renderFeedTab();
  else if (S.tab === 'animals') renderAnimalsTab();
}

// ─── Start tab ────────────────────────────────────────────────────────────────
async function renderStartTab() {
  const el = document.getElementById('start-inner');
  el.innerHTML = '<div style="padding:32px;text-align:center;color:var(--muted)">Lädt…</div>';
  try {
    const dash = await api('GET', '/api/dashboard' + aq());
    S.dashboard = dash;
    const a = dash.animal;
    const feed = dash.feeding;
    const pct = Math.min((feed.today_g / feed.target_g) * 100, 100);
    const fillCls = pct >= 100 ? 'done' : feed.today_g > feed.target_g ? 'over' : '';
    const latest = dash.weight.latest;

    let upHtml = '';
    if (dash.upcoming_health.length) {
      upHtml = '<div class="event-list">' + dash.upcoming_health.slice(0, 4).map(function(e) {
        return '<div class="event-item ' + (e.overdue ? 'overdue' : 'upcoming') + '">' +
          '<div><span class="event-badge badge-' + esc(e.type.replace(/ /g,'-')) + '">' + esc(e.type) + '</span></div>' +
          '<div class="event-body">' +
          '<div class="event-title">' + esc(e.title) + '</div>' +
          '<div class="event-due ' + (e.overdue ? 'overdue' : 'upcoming') + '">' + (e.overdue ? '⚠️ Überfällig' : '📅') + ' ' + fmtDate(e.due_date) + '</div>' +
          '</div></div>';
      }).join('') + '</div>';
      if (dash.upcoming_health.length > 4)
        upHtml += '<div style="margin-top:10px;text-align:center"><button class="btn btn-ghost btn-sm" onclick="switchTab(\'health\')">Alle anzeigen →</button></div>';
    } else {
      upHtml = '<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Keine fälligen Termine</div></div>';
    }

    el.innerHTML =
      (a ? '<div class="card"><div class="animal-hero">' +
        '<div class="animal-avatar">' + (a.icon || '🐾') + '</div>' +
        '<div class="animal-info"><h2>' + esc(a.name) + '</h2>' +
        '<div class="species-label">' + esc(a.species) + '</div>' +
        (a.age ? '<div class="age-label">' + esc(a.age) + ' alt</div>' : '') +
        '</div></div>' +
        '<div class="animal-stats">' +
        '<div class="stat"><div class="val">' + (latest ? latest.weight_kg + ' kg' : '—') + '</div><div class="lbl">Gewicht</div></div>' +
        '<div class="stat"><div class="val">' + feed.today_g + ' g</div><div class="lbl">Heute gefressen</div></div>' +
        '<div class="stat"><div class="val">' + dash.upcoming_health.length + '</div><div class="lbl">Fällige Termine</div></div>' +
        '</div></div>' : '') +

      '<div class="card"><div class="card-title">Fütterung heute</div>' +
      '<div class="progress-row"><span class="p-val">' + feed.today_g + ' g</span><span class="p-target">Ziel: ' + feed.target_g + ' g</span></div>' +
      '<div class="progress-bar"><div class="progress-fill ' + fillCls + '" style="width:' + pct.toFixed(1) + '%"></div></div>' +
      '<div class="progress-note">' + (pct >= 100 ? '✅ Tagesziel erreicht' : 'Noch ' + Math.max(0, feed.target_g - feed.today_g) + ' g bis zum Tagesziel') + '</div></div>' +

      '<div class="card"><div class="card-title">Gesundheits-Termine</div>' + upHtml + '</div>';
  } catch(e) {
    el.innerHTML = '<div class="card" style="color:var(--danger);font-size:.85rem">' + esc(e.message) + '</div>';
  }
}

// ─── Health tab ───────────────────────────────────────────────────────────────
const HEALTH_TYPES = ['Impfung','Wurmkur','Parasitenschutz','Tierarzt-Termin','Sonstiges'];

function renderHealthFilter() {
  document.getElementById('health-filter').innerHTML = [null].concat(HEALTH_TYPES).map(function(t) {
    return '<button class="chip' + (S.healthFilter === t ? ' active' : '') + '" onclick="setHealthFilter(' + (t ? '\'' + t + '\'' : 'null') + ')">' + (t || 'Alle') + '</button>';
  }).join('');
}

function setHealthFilter(t) {
  S.healthFilter = t;
  renderHealthFilter();
  renderHealthList();
}

async function renderHealthTab() {
  renderHealthFilter();
  const q = aq(S.healthFilter ? { type: S.healthFilter } : {});
  try {
    S.health = await api('GET', '/api/health' + q);
    renderHealthList();
  } catch(e) {
    document.getElementById('health-list').innerHTML = '<div style="color:var(--danger);font-size:.85rem;padding:12px">' + esc(e.message) + '</div>';
  }
}

function renderHealthList() {
  const el = document.getElementById('health-list');
  const items = S.healthFilter ? S.health.filter(function(e) { return e.type === S.healthFilter; }) : S.health;
  if (!items.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">💊</div><div class="empty-text">Keine Einträge</div></div>';
    return;
  }
  el.innerHTML = '<div class="event-list">' + items.map(function(e) {
    return '<div class="event-item ' + (e.overdue ? 'overdue' : e.due_date ? 'upcoming' : 'ok') + '">' +
      '<div><span class="event-badge badge-' + esc(e.type.replace(/ /g,'-')) + '">' + esc(e.type) + '</span></div>' +
      '<div class="event-body">' +
      '<div class="event-title">' + esc(e.title) + '</div>' +
      '<div class="event-date">' + fmtDate(e.date) + (e.note ? ' · ' + esc(e.note) : '') + (e.person ? ' · ' + esc(e.person) : '') + '</div>' +
      (e.due_date ? '<div class="event-due ' + (e.overdue ? 'overdue' : 'upcoming') + '">' + (e.overdue ? '⚠️ Überfällig' : '📅') + ' Fällig: ' + fmtDate(e.due_date) + (e.repeat_weeks ? ' (alle ' + e.repeat_weeks + ' Wo.)' : '') + '</div>' : '') +
      '</div>' +
      '<div class="event-actions">' +
      '<button class="icon-btn" onclick="openHealthModal(' + e.id + ')" title="Bearbeiten">✏️</button>' +
      '<button class="icon-btn danger" onclick="deleteHealth(' + e.id + ')" title="Löschen">🗑️</button>' +
      '</div></div>';
  }).join('') + '</div>';
}

async function deleteHealth(id) {
  if (!confirm('Eintrag löschen?')) return;
  try {
    await api('DELETE', '/api/health/' + id);
    toast('Gelöscht');
    S.health = S.health.filter(function(e) { return e.id !== id; });
    renderHealthList();
  } catch(e) { toast(e.message, true); }
}

function openHealthModal(id) {
  const ev = id ? S.health.find(function(e) { return e.id === id; }) : null;
  document.getElementById('modal-title').textContent = ev ? 'Eintrag bearbeiten' : 'Neuer Gesundheitseintrag';
  document.getElementById('modal-body').innerHTML =
    '<div class="form-group"><label>Typ</label><select id="hm-type">' +
    HEALTH_TYPES.map(function(t) { return '<option value="' + t + '"' + (ev && ev.type === t ? ' selected' : '') + '>' + t + '</option>'; }).join('') +
    '</select></div>' +
    '<div class="form-group"><label>Titel</label><input id="hm-title" type="text" placeholder="z.B. DHPP-Auffrischung" value="' + esc(ev ? ev.title : '') + '"></div>' +
    '<div class="form-row">' +
    '<div class="form-group"><label>Datum</label><input id="hm-date" type="date" value="' + ((ev && ev.date) || todayISO()) + '"></div>' +
    '<div class="form-group"><label>Fällig am</label><input id="hm-due" type="date" value="' + ((ev && ev.due_date) || '') + '"></div>' +
    '</div>' +
    '<div class="form-group"><label>Wiederholung (Wochen, leer = einmalig)</label><input id="hm-repeat" type="number" min="1" max="104" placeholder="z.B. 52" value="' + ((ev && ev.repeat_weeks) || '') + '"></div>' +
    '<div class="form-group"><label>Notiz</label><textarea id="hm-note">' + esc((ev && ev.note) || '') + '</textarea></div>' +
    '<div class="form-row" style="gap:8px;margin-top:6px">' +
    '<button class="btn btn-ghost btn-full" onclick="closeModal()">Abbrechen</button>' +
    '<button class="btn btn-primary btn-full" onclick="saveHealth(' + (id || 'null') + ')">Speichern</button>' +
    '</div>';
  openModal();
}

async function saveHealth(id) {
  const repeatVal = document.getElementById('hm-repeat').value;
  const body = withAnimal({
    type: document.getElementById('hm-type').value,
    title: document.getElementById('hm-title').value.trim(),
    date: document.getElementById('hm-date').value,
    due_date: document.getElementById('hm-due').value || null,
    repeat_weeks: repeatVal ? parseInt(repeatVal) : null,
    note: document.getElementById('hm-note').value.trim() || null,
  });
  try {
    if (id) await api('PATCH', '/api/health/' + id, body);
    else await api('POST', '/api/health', body);
    toast('Gespeichert ✓');
    closeModal();
    await renderHealthTab();
  } catch(e) { toast(e.message, true); }
}

// ─── Feed tab ─────────────────────────────────────────────────────────────────
async function renderFeedTab() {
  try {
    const results = await Promise.all([
      api('GET', '/api/feedings' + aq({ limit: 30 })),
      api('GET', '/api/weights' + aq()),
      api('GET', '/api/dashboard' + aq()),
    ]);
    S.feedings = results[0].items;
    S.feedSuggestions = results[0].suggestions;
    S.weights = results[1];
    S.dashboard = results[2];
    renderFeedingsInner();
    renderWeightsInner();
  } catch(e) {
    document.getElementById('feedings-inner').innerHTML = '<div style="color:var(--danger);font-size:.85rem;padding:12px">' + esc(e.message) + '</div>';
  }
}

function renderFeedingsInner() {
  const todayTotal = (S.dashboard && S.dashboard.feeding && S.dashboard.feeding.today_g) || 0;
  const target = (S.meta && S.meta.daily_food_target_g) || 300;
  const pct = Math.min((todayTotal / target) * 100, 100);
  const fillCls = pct >= 100 ? 'done' : '';

  const suggHtml = S.feedSuggestions.map(function(s) {
    return '<button class="suggestion" onclick="document.getElementById(\'f-type\').value=\'' + esc(s) + '\'">' + esc(s) + '</button>';
  }).join('');

  const listHtml = S.feedings.length ? S.feedings.map(function(f) {
    return '<div class="feeding-item">' +
      '<div style="flex:1;min-width:0"><div class="feeding-food">' + esc(f.food_type) + '</div>' +
      '<div class="feeding-meta">' + fmtDateTime(f.ts_utc) + (f.person ? ' · ' + esc(f.person) : '') + '</div></div>' +
      '<div class="feeding-amount">' + f.amount_g + ' g</div>' +
      '<button class="icon-btn danger" onclick="deleteFeeding(' + f.id + ')">🗑️</button>' +
      '</div>';
  }).join('') : '<div class="empty"><div class="empty-icon">🍖</div><div class="empty-text">Noch keine Fütterungen</div></div>';

  document.getElementById('feedings-inner').innerHTML =
    '<div class="card"><div class="card-title">Heute</div>' +
    '<div class="progress-row"><span class="p-val">' + todayTotal + ' g</span><span class="p-target">/ ' + target + ' g</span></div>' +
    '<div class="progress-bar"><div class="progress-fill ' + fillCls + '" style="width:' + pct.toFixed(1) + '%"></div></div>' +
    '<div class="progress-note">' + (pct >= 100 ? '✅ Tagesziel erreicht' : 'Noch ' + Math.max(0, target - todayTotal) + ' g bis zum Tagesziel') + '</div></div>' +

    '<div class="card"><div class="card-title">Fütterung eintragen</div>' +
    '<div class="form-group"><label>Futterart</label>' +
    '<input id="f-type" type="text" placeholder="Trockenfutter, Nassfutter…">' +
    '<div class="suggestions">' + suggHtml + '</div></div>' +
    '<div class="form-row">' +
    '<div class="form-group"><label>Menge (g)</label><input id="f-amount" type="number" min="1" max="5000" placeholder="150"></div>' +
    '<div class="form-group"><label>Uhrzeit</label><input id="f-time" type="datetime-local"></div>' +
    '</div>' +
    '<button class="btn btn-primary btn-full" onclick="addFeeding()">Eintragen</button></div>' +

    '<div class="card"><div class="card-title">Letzte Fütterungen</div>' + listHtml + '</div>';
}

async function addFeeding() {
  const food_type = document.getElementById('f-type').value.trim();
  const amount_g = parseInt(document.getElementById('f-amount').value);
  if (!food_type || !amount_g) { toast('Futterart und Menge erforderlich', true); return; }
  const timeVal = document.getElementById('f-time').value;
  const ts_utc = timeVal ? new Date(timeVal).toISOString().replace('.000Z','Z') : null;
  try {
    await api('POST', '/api/feedings', withAnimal({ food_type, amount_g, ts_utc }));
    toast('Fütterung gespeichert ✓');
    document.getElementById('f-type').value = '';
    document.getElementById('f-amount').value = '';
    await renderFeedTab();
    if (S.tab === 'start') await renderStartTab();
  } catch(e) { toast(e.message, true); }
}

async function deleteFeeding(id) {
  if (!confirm('Fütterung löschen?')) return;
  try {
    await api('DELETE', '/api/feedings/' + id);
    toast('Gelöscht');
    await renderFeedTab();
  } catch(e) { toast(e.message, true); }
}

function renderWeightsInner() {
  const latest = S.weights.length ? S.weights[S.weights.length - 1] : null;
  const chart = S.weights.length > 1 ? buildWeightChart(S.weights) : '';

  const listHtml = S.weights.length ? S.weights.slice().reverse().map(function(w) {
    return '<div class="weight-item">' +
      '<div><div class="weight-val">' + w.weight_kg + ' kg</div>' +
      '<div class="weight-sub">' + fmtDate(w.date) + (w.person ? ' · ' + esc(w.person) : '') + '</div></div>' +
      '<button class="icon-btn danger" onclick="deleteWeight(' + w.id + ')">🗑️</button>' +
      '</div>';
  }).join('') : '<div class="empty"><div class="empty-icon">⚖️</div><div class="empty-text">Noch keine Messungen</div></div>';

  document.getElementById('weights-inner').innerHTML =
    '<div class="card">' +
    (chart ? '<div class="card-title">Verlauf</div><div class="weight-chart-wrap">' + chart + '</div>' : '') +
    '<div style="margin-bottom:14px">' +
    '<div style="font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Aktuelles Gewicht</div>' +
    '<div style="font-size:1.7rem;font-weight:800;color:var(--primary);line-height:1">' + (latest ? latest.weight_kg + ' kg' : '—') + '</div>' +
    (latest ? '<div style="font-size:.75rem;color:var(--muted);margin-top:4px">' + fmtDate(latest.date) + '</div>' : '') +
    '</div>' +
    '<div class="form-row">' +
    '<div class="form-group"><label>Gewicht (kg)</label><input id="w-kg" type="number" min="0.1" max="200" step="0.01" placeholder="7.25"></div>' +
    '<div class="form-group"><label>Datum</label><input id="w-date" type="date" value="' + todayISO() + '"></div>' +
    '</div>' +
    '<button class="btn btn-primary btn-full" onclick="addWeight()">Gewicht eintragen</button></div>' +

    '<div class="card"><div class="card-title">Alle Messungen</div>' + listHtml + '</div>';
}

function buildWeightChart(weights) {
  const W = 320, H = 88, PX = 14, PY = 12;
  const vals = weights.map(function(w) { return w.weight_kg; });
  const minV = Math.min.apply(null, vals), maxV = Math.max.apply(null, vals);
  const range = maxV - minV || 0.1;
  const n = weights.length;
  function toX(i) { return PX + (i / (n - 1)) * (W - PX * 2); }
  function toY(v) { return H - PY - ((v - minV) / range) * (H - PY * 2); }

  const pts = weights.map(function(w, i) { return toX(i).toFixed(1) + ',' + toY(w.weight_kg).toFixed(1); }).join(' ');
  const lx = toX(n - 1), ly = toY(vals[n - 1]);

  return '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' +
    '<polyline fill="none" stroke="var(--primary)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" points="' + pts + '"/>' +
    '<circle cx="' + lx.toFixed(1) + '" cy="' + ly.toFixed(1) + '" r="3.5" fill="var(--primary)"/>' +
    '<text x="' + lx.toFixed(1) + '" y="' + (ly - 7).toFixed(1) + '" text-anchor="middle" font-size="9" fill="var(--primary)" font-family="sans-serif" font-weight="700">' + vals[n-1] + '</text>' +
    '<text x="' + PX + '" y="' + (H - 3) + '" font-size="8" fill="var(--muted)" font-family="sans-serif">' + minV + '</text>' +
    '<text x="' + PX + '" y="' + (PY + 2) + '" font-size="8" fill="var(--muted)" font-family="sans-serif">' + maxV + '</text>' +
    '</svg>';
}

async function addWeight() {
  const weight_kg = parseFloat(document.getElementById('w-kg').value);
  const date = document.getElementById('w-date').value;
  if (!weight_kg || !date) { toast('Gewicht und Datum erforderlich', true); return; }
  try {
    await api('POST', '/api/weights', withAnimal({ weight_kg, date }));
    toast('Gewicht gespeichert ✓');
    document.getElementById('w-kg').value = '';
    await renderFeedTab();
    if (S.tab === 'start') await renderStartTab();
  } catch(e) { toast(e.message, true); }
}

async function deleteWeight(id) {
  if (!confirm('Eintrag löschen?')) return;
  try {
    await api('DELETE', '/api/weights/' + id);
    toast('Gelöscht');
    await renderFeedTab();
  } catch(e) { toast(e.message, true); }
}

// ─── Animals tab ──────────────────────────────────────────────────────────────
function renderAnimalsTab() {
  const animals = (S.meta && S.meta.animals) || [];
  const listHtml = animals.length ? animals.map(function(a) {
    return '<div class="animal-item">' +
      '<div class="animal-icon">' + a.icon + '</div>' +
      '<div style="flex:1;min-width:0">' +
      '<div class="animal-name">' + esc(a.name) + '</div>' +
      '<div class="animal-sub">' + esc(a.species) + (a.age ? ' · ' + esc(a.age) + ' alt' : '') + (a.birthdate ? ' · geb. ' + fmtDate(a.birthdate) : '') + '</div>' +
      '</div>' +
      '<div style="display:flex;gap:3px">' +
      '<button class="icon-btn" onclick="openAnimalModal(' + a.id + ')">✏️</button>' +
      '<button class="icon-btn danger" onclick="deleteAnimalConfirm(' + a.id + ')">🗑️</button>' +
      '</div></div>';
  }).join('') : '<div class="empty"><div class="empty-icon">🐾</div><div class="empty-text">Noch keine Tiere eingetragen</div></div>';

  document.getElementById('animals-inner').innerHTML =
    listHtml +
    '<button class="btn btn-primary btn-full" style="margin-top:6px" onclick="openAnimalModal(null)">+ Tier hinzufügen</button>';
}

function openAnimalModal(id) {
  const a = id ? (S.meta && S.meta.animals.find(function(x) { return x.id === id; })) : null;
  const opts = (S.meta && S.meta.species_options) || ['dog','cat','rabbit','bird','reptile','other'];
  document.getElementById('modal-title').textContent = a ? 'Tier bearbeiten' : 'Neues Tier';
  document.getElementById('modal-body').innerHTML =
    '<div class="form-group"><label>Name</label><input id="am-name" type="text" placeholder="Name des Tieres" value="' + esc(a ? a.name : '') + '"></div>' +
    '<div class="form-group"><label>Tierart</label><select id="am-species">' +
    opts.map(function(s) { return '<option value="' + s + '"' + (a && a.species === s ? ' selected' : '') + '>' + s + '</option>'; }).join('') +
    '</select></div>' +
    '<div class="form-group"><label>Geburtsdatum (optional)</label><input id="am-birth" type="date" value="' + ((a && a.birthdate) || '') + '"></div>' +
    '<div class="form-row" style="gap:8px;margin-top:6px">' +
    '<button class="btn btn-ghost btn-full" onclick="closeModal()">Abbrechen</button>' +
    '<button class="btn btn-primary btn-full" onclick="saveAnimal(' + (id || 'null') + ')">Speichern</button>' +
    '</div>';
  openModal();
}

async function saveAnimal(id) {
  const body = {
    name: document.getElementById('am-name').value.trim(),
    species: document.getElementById('am-species').value,
    birthdate: document.getElementById('am-birth').value || null,
  };
  try {
    if (id) await api('PATCH', '/api/animals/' + id, body);
    else await api('POST', '/api/animals', body);
    toast('Gespeichert ✓');
    closeModal();
    await reloadMeta();
    renderAnimalBar();
    renderAnimalsTab();
  } catch(e) { toast(e.message, true); }
}

async function deleteAnimalConfirm(id) {
  const a = S.meta && S.meta.animals.find(function(x) { return x.id === id; });
  if (!confirm((a ? a.name : 'Tier') + ' wirklich löschen? Alle Daten gehen verloren.')) return;
  try {
    await api('DELETE', '/api/animals/' + id);
    toast('Gelöscht');
    if (S.animalId === id) S.animalId = null;
    await reloadMeta();
    if (!S.animalId && S.meta.animals.length) S.animalId = S.meta.animals[0].id;
    persist();
    renderAnimalBar();
    renderAnimalsTab();
  } catch(e) { toast(e.message, true); }
}

// ─── Modal ─────────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-backdrop').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
}
document.getElementById('modal-backdrop').addEventListener('click', function(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
});

// ─── Init ──────────────────────────────────────────────────────────────────────
async function reloadMeta() {
  S.meta = await api('GET', '/api/meta');
  if (S.animalId && !S.meta.animals.find(function(a) { return a.id === S.animalId; })) S.animalId = null;
  if (!S.animalId && S.meta.animals.length) S.animalId = S.meta.animals[0].id;
  if (!S.person && S.meta.persons.length) S.person = S.meta.persons[0];
  persist();
}

async function init() {
  restorePersistedState();
  await reloadMeta();
  renderPersonChips();
  renderAnimalBar();
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === S.tab); });
  document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.toggle('active', p.id === 'tab-' + S.tab); });
  document.getElementById('fab').style.display = S.tab === 'health' ? 'flex' : 'none';
  await refreshTab();
}

init().catch(function(e) {
  document.body.innerHTML = '<div style="padding:32px;font-family:sans-serif;color:var(--danger)"><h2>Fehler beim Laden</h2><p style="margin-top:8px;font-size:.9rem">' + String(e.message) + '</p></div>';
});
</script>
</body>
